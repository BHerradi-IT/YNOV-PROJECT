<!DOCTYPE html>
<html>
<head>
    <title>Effacer les données du navigateur</title>
</head>
<body>
    <h1>Effacement des données du navigateur</h1>
    <p>Les données localStorage et sessionStorage vont être effacées...</p>
    <script>
        // Effacer localStorage
        localStorage.clear();
        console.log('LocalStorage effacé!');
        
        // Effacer sessionStorage
        sessionStorage.clear();
        console.log('SessionStorage effacé!');
        
        // Effacer tous les cookies
        document.cookie.split(";").forEach(function(c) { 
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/");
        });
        console.log('Cookies effacés!');
        
        alert('Toutes les données du navigateur ont été effacées!\n\nLocalStorage, SessionStorage et Cookies sont maintenant vides.\n\nVous pouvez fermer cette page et retourner à l\'application YTECH.');
        
        // Rediriger vers l'application après 3 secondes
        setTimeout(() => {
            window.location.href = 'http://localhost:3000';
        }, 3000);
    </script>
</body>
</html>
